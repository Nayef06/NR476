<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>476 Apparel Scheduler</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="container">
        <header class="no-print">
            <div class="logo-container">
                <!-- width increased to ensure the full wordmark fits within the viewBox; additional
                     overflow rule on the svg handles any slight overhangs gracefully -->
                <svg viewBox="0 0 300 24" xmlns="http://www.w3.org/2000/svg">
                    <text x="0" y="20" font-family="Outfit, sans-serif" font-weight="700" font-size="25"
                        letter-spacing="0.05em">NORDSTROM <tspan font-weight="300">RACK</tspan></text>
                </svg>
            </div>
        </header>
        <div class="config-grid no-print">
            <div class="input-group"><label>Store Opens</label><input type="time" id="storeOpen" value="10:00"></div>
            <div class="input-group"><label>Store Closes</label><input type="time" id="storeClose" value="21:00"></div>
        </div>
        <div id="workersContainer" class="no-print"></div>
        <div class="button-group no-print">
            <button class="btn-add" onclick="addWorkerRow()">+ Add Worker</button>
            <button class="btn-add" onclick="clearWorkers()" title="Remove all worker entries">× Clear All Workers</button>
        </div>
        <button class="btn-gen no-print" onclick="generate()">Generate Optimized Schedule</button>

        <div id="results" style="display:none;">
            <div class="results-grid">
                <div>
                    <h2>Floor & Breaks</h2>
                    <table id="breaksTable">
                        <thead>
                            <tr>
                                <th style="width:120px">Worker</th>
                                <th>Break 1</th>
                                <th>Lunch</th>
                                <th>Break 2</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div>
                    <h2>Fitting Room Rotation</h2>
                    <table id="fittingRoomTable">
                        <thead>
                            <tr>
                                <th style="width:142px">Time</th>
                                <th>Greeter</th>
                                <th>Sorter</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div style="text-align: right;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
